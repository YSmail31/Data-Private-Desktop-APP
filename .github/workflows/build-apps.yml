# Build des apps desktop Tauri (Data Private Desktop).
#
# Windows + Linux + macOS : entièrement automatiques (aucun secret requis).
#   - Windows : .msi + .exe (NSIS)
#   - Linux   : .deb + .AppImage + .rpm
#   - macOS   : .dmg + .app (binaire universel Apple Silicon + Intel, NON signé)
#
# Note macOS : le .dmg n'est pas signé/notarisé (pas de compte Apple Developer
# requis). À la première ouverture, l'utilisateur doit faire clic-droit > Ouvrir
# (ou Réglages Système > Confidentialité et sécurité > "Ouvrir quand même").
#
# Déclenchement :
#   - push d'un tag `v*` (ex: v0.1.0) -> build + Release GitHub publiée.
#   - manuel via "Run workflow" (workflow_dispatch).
#
# Le projet Tauri est À LA RACINE de ce dépôt (npm) et `src-tauri/` (Rust).
# IMPORTANT : `src-tauri/Cargo.lock` DOIT rester commité (il épingle
# `time = 0.3.47`, sinon le build casse avec l'erreur de cohérence cookie/time).

name: Build apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Windows (.msi + .exe NSIS), Linux (.deb + .AppImage + .rpm)
  # et macOS (.dmg universel Apple Silicon + Intel).
  # ---------------------------------------------------------------------------
  desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust_targets: ""
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances système Linux (WebKitGTK, etc.)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file \
            wget

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Toolchain Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install deps frontend
        run: npm ci

      - name: Build Tauri + Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Data Private ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ---------------------------------------------------------------------------
  # Variante GPU NVIDIA (CUDA) : artefacts SÉPARÉS, suffixés "-cuda".
  # Le build CPU ci-dessus reste le téléchargement par défaut (marche partout).
  # Le binaire CUDA est lié dynamiquement au runtime CUDA : à réserver aux
  # utilisateurs disposant d'un GPU NVIDIA + pilotes/runtime CUDA installés.
  # `needs: desktop` => la Release existe déjà quand on y attache les fichiers.
  # ---------------------------------------------------------------------------
  desktop-cuda:
    needs: desktop
    # Non bloquant : une défaillance du build GPU ne doit jamais empêcher la
    # publication des artefacts CPU/Metal (déjà créés par le job `desktop`).
    continue-on-error: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    # Les runners CI n'ont pas de GPU : on fixe la compute capability cible
    # (sinon bindgen_cuda/candle-kernels tente de détecter le GPU et échoue).
    # 7.5 (Turing) => PTX compatible en avant avec Ampere/Ada via JIT.
    #
    # NVCC_PREPEND_FLAGS : nvcc (CUDA 12.5) refuse les versions récentes de MSVC
    # présentes sur windows-latest. `-allow-unsupported-compiler` lève ce blocage
    # (no-op sur Linux où gcc est supporté).
    env:
      CUDA_COMPUTE_CAP: "75"
      NVCC_PREPEND_FLAGS: "-allow-unsupported-compiler"
    steps:
      - uses: actions/checkout@v4

      - name: Environnement MSVC (cl.exe pour nvcc)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Dépendances système Linux (WebKitGTK, etc.)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file \
            wget

      - name: Toolkit CUDA
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: "12.5.0"
          method: "network"

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Toolchain Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (CUDA)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: cuda

      - name: Install deps frontend
        run: npm ci

      - name: Build Tauri (CUDA)
        run: npx tauri build --features cuda

      - name: Renomme + publie les artefacts CUDA (Windows)
        if: matrix.platform == 'windows-latest' && github.ref_type == 'tag'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $bundle = "src-tauri/target/release/bundle"
          Get-ChildItem -Recurse -Path $bundle -Include *.exe, *.msi | ForEach-Object {
            $new = Join-Path $_.DirectoryName ($_.BaseName + "-cuda" + $_.Extension)
            Rename-Item -Path $_.FullName -NewName $new
            gh release upload $tag $new --clobber
          }

      - name: Renomme + publie les artefacts CUDA (Linux)
        if: matrix.platform == 'ubuntu-22.04' && github.ref_type == 'tag'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          bundle="src-tauri/target/release/bundle"
          find "$bundle" -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" \) | while read -r f; do
            dir=$(dirname "$f"); base=$(basename "$f")
            name="${base%.*}"; ext="${base##*.}"
            new="$dir/${name}-cuda.${ext}"
            mv "$f" "$new"
            gh release upload "$tag" "$new" --clobber
          done
